version: '3.8'

# Para desarrollo local con Elasticsearch local
# Para producción usa Elastic Cloud Serverless (ya configurado en .env)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosecha_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    command: uvicorn cosecha_urbana_ai.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Opcional: ES local para desarrollo sin Elastic Cloud
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: cosecha_es_local
    profiles: ["local"]
    environment:
      - node.name=cosecha_es
      - cluster.name=cosecha-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=cosecha2024
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:cosecha2024 -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  esdata:
